<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed - REVO</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary-color: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.5);
      --text-color: #ffffff;
      --text-secondary: #94a3b8;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Outfit', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Ambient background glow */
    .glow-bg {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--primary-glow) 0%, rgba(11, 15, 25, 0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
      filter: blur(80px);
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 3rem 2rem;
      border-radius: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      transform: translateY(20px);
      opacity: 0;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .icon-container {
      width: 80px;
      height: 80px;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    }

    .icon-container svg {
      width: 40px;
      height: 40px;
      color: var(--primary-color);
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin: 0 0 1rem;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 0 0 2rem;
    }

    .btn {
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
      background: var(--primary-color);
      color: #ffffff;
      text-decoration: none;
      padding: 1rem 2rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #64748b;
    }

    @keyframes fadeInUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>
  <div class="container">
    <div class="icon-container">
      <!-- Checked/Success Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <h1>Email Verified!</h1>
    <p>Your email has been successfully confirmed. Click the button below to open the REVO app and log in.</p>
    
    <a href="https://vedamurthy1123-cpu.github.io/REVO-/#/login" id="open-app-btn" class="btn">Open REVO App</a>

    <div class="footer">
      Click the button above to go to the login page.
    </div>
  </div>

  <script>
    // No auto-redirect. The button href is already set in the anchor tag above.
    // Clicking the button is the only way to navigate to the login page.
  </script>
</body>
</html>
